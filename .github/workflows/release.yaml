name: Release

on:
  push:
    tags:
      - 'release/*'

concurrency:
  group: "release"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        tool: [claude]

    steps:
      - uses: actions/checkout@v4

      # Enable QEMU for cross-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Enable Buildx (multi-arch builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release tag name
        id: tag
        run: echo "TAG=${GITHUB_REF_NAME#release/}" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.tool }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.tool }}
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}/${{ matrix.tool }}-${{ env.TAG }}
